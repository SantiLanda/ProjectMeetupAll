<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Avatar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
   <div class="image-container">
      <div class="image">
         <!-- Nueva imagen del avatar -->
         <img class="avatar" src="images/new-avatar.png" alt="Dynamic Avatar">
         <img class="face face-1" src="images/new-avatar.png" alt="Dynamic Avatar Layer 1">
         <img class="face face-2" src="images/new-avatar.png" alt="Dynamic Avatar Layer 2">
         <img class="face face-3" src="images/new-avatar.png" alt="Dynamic Avatar Layer 3">
      </div>
      <div class="curtain" id="curtain"></div>
   </div>
</header>
</body>
</html>
