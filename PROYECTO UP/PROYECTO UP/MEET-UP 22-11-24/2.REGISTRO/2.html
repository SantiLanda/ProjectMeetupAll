<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Meet-Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo.png" alt="Meet-Up Logo">
    </div>
    <h1>Create Your Account</h1>
    <p>Join the community and start connecting!</p>
  </header>

  <main>
    <section class="register-form">
      <form id="registration-form">
        <label for="name">Full Name:</label>
        <input type="text" id="name" placeholder="Enter your full name" required>
        
        <label for="email">Email Address:</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter your password" required>
        
        <label for="fingerprint">Biometric Authentication:</label>
        <button type="button" id="fingerprint-scan">Scan Fingerprint</button>
        
        <div id="biometric-status"></div>

        <button type="submit" id="submit-registration">Register</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Meet-Up. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
