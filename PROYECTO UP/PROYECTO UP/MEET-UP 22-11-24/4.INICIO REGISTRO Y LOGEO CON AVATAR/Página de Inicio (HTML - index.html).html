<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet-Up</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="logo.png" alt="Meet-Up Logo">
    </div>
    <h1>What is Meet-Up?</h1>
    <p>Connect. Create. Share.</p>
    <div class="cta-buttons">
      <a href="register.html"><button id="join-now">Join Now</button></a>
      <a href="login.html"><button id="explore-events">Log In</button></a>
    </div>
  </header>

  <main>
    <section class="features">
      <div class="feature-card">
        <h2>Discover Events</h2>
        <p>Find events near you that match your interests.</p>
      </div>
      <div class="feature-card">
        <h2>Create Communities</h2>
        <p>Build your own groups and host activities easily.</p>
      </div>
      <div class="feature-card">
        <h2>Connect with People</h2>
        <p>Form meaningful relationships with like-minded people.</p>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Meet-Up. All Rights Reserved.</p>
  </footer>

  <!-- Script for interactivity -->
  <script src="script.js"></script>
